version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: trivia-engine-mcp:latest
    container_name: trivia-engine-mcp
    environment:
      # API Configuration
      TRIVIA_API_BASE_URL: ${TRIVIA_API_BASE_URL:-http://host.docker.internal:3003/api/v1}
      TRIVIA_API_KEY: ${TRIVIA_API_KEY}
      # Node environment
      NODE_ENV: production
    # For stdio communication, we need to keep stdin open and allocate a TTY
    stdin_open: true
    tty: true
    # Use host network mode for easy access to host's trivia API
    # Alternative: use bridge mode and configure API URL accordingly
    network_mode: host
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Development version with hot reload
  mcp-server-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: trivia-engine-mcp:dev
    container_name: trivia-engine-mcp-dev
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/build
    environment:
      TRIVIA_API_BASE_URL: ${TRIVIA_API_BASE_URL:-http://host.docker.internal:3003/api/v1}
      TRIVIA_API_KEY: ${TRIVIA_API_KEY}
      NODE_ENV: development
    stdin_open: true
    tty: true
    network_mode: host
    command: npm run dev