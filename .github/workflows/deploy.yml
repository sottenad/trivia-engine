name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trivia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            marketing/package-lock.json

      - name: Install API dependencies
        working-directory: ./app
        run: npm ci

      - name: Setup test environment
        working-directory: ./app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trivia_test
        run: |
          cp ../.env.example .env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgresql://postgres:postgres@localhost:5432/trivia_test|' .env
          npx prisma migrate deploy
          npx prisma generate

      - name: Run API tests
        working-directory: ./app
        run: npm test || echo "No tests configured"
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trivia_test
          JWT_SECRET: test-secret

      - name: Install Marketing dependencies
        working-directory: ./marketing
        run: npm ci

      - name: Run Marketing build
        working-directory: ./marketing
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3003/api/v1
          NEXT_PUBLIC_API_KEY: test-key

      - name: Run Marketing type check
        working-directory: ./marketing
        run: npm run type-check

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
            cd /home/$USER/trivia-engine
            git fetch origin
            git checkout main
            git pull origin main
            
            # Deploy API
            cd app
            npm ci --production
            npx prisma migrate deploy
            npx prisma generate
            
            # Deploy Marketing
            cd ../marketing
            npm ci
            npm run build
            
            # Restart services
            sudo systemctl restart trivia-api
            sudo systemctl restart trivia-marketing
            
            # Check health
            sleep 5
            curl -f http://localhost:3003/api/v1/health || exit 1
          EOF

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              environment_url: 'https://${{ secrets.PRODUCTION_URL }}',
              description: 'Deployment completed successfully'
            });

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request?.number || 1,
              body: '❌ Deployment to production failed! Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });