# Nginx configuration for trivia-engine.com
# Place this file in /etc/nginx/sites-available/trivia-engine
# Then symlink: ln -s /etc/nginx/sites-available/trivia-engine /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# Upstream definitions for load balancing (if using PM2 cluster mode)
upstream api_backend {
    least_conn;
    server localhost:3003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream marketing_backend {
    server localhost:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name trivia-engine.com www.trivia-engine.com;
    
    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trivia-engine.com www.trivia-engine.com;

    # SSL Configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/trivia-engine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trivia-engine.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:;" always;

    # Logging
    access_log /var/log/nginx/trivia-engine.access.log combined;
    error_log /var/log/nginx/trivia-engine.error.log warn;

    # General Settings
    client_max_body_size 10M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/javascript application/vnd.ms-fontobject 
               application/x-font-ttf font/opentype;

    # API Routes
    location /api {
        # Rate limiting for API
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        
        # Proxy to API backend
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for SSE/WebSocket
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Handle errors
        proxy_intercept_errors on;
        error_page 502 503 504 /api-error.html;
    }

    # Health check endpoint (no rate limiting)
    location = /api/v1/health {
        proxy_pass http://api_backend/api/v1/health;
        access_log off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js static files
    location /_next/static {
        alias /home/trivia/trivia-engine/marketing/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public static files
    location /static {
        alias /home/trivia/trivia-engine/marketing/public/static;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Favicon and robots
    location = /favicon.ico {
        alias /home/trivia/trivia-engine/marketing/public/favicon.ico;
        expires 30d;
        access_log off;
    }

    location = /robots.txt {
        alias /home/trivia/trivia-engine/marketing/public/robots.txt;
        expires 30d;
        access_log off;
    }

    # Marketing site (Next.js)
    location / {
        # Rate limiting for general traffic
        limit_req zone=general_limit burst=50 nodelay;
        
        # Proxy to Next.js
        proxy_pass http://marketing_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Cache settings
        proxy_cache_bypass $http_upgrade;
        
        # Handle errors
        proxy_intercept_errors on;
        error_page 502 503 504 /error.html;
    }

    # Custom error pages
    location = /error.html {
        root /home/trivia/trivia-engine/deploy/static;
        internal;
    }

    location = /api-error.html {
        root /home/trivia/trivia-engine/deploy/static;
        internal;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Monitoring endpoint (optional)
server {
    listen 127.0.0.1:8080;
    server_name _;
    
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}